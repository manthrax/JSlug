<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slug Font Rendering Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #004040; color: white; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        button, input { margin-bottom: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <h3>Slug - Three.js</h3>
        <div>
            <label>Select Font:</label><br>
            <select id="fontSelect" style="width: 100%; margin-bottom: 10px; padding: 5px; background: #333; color: #fff; border: 1px solid #555;">
                <!-- Dynamically populated from fonts.json -->
            </select>
        </div>
        <hr>
        <div>
            <label>Load .sluggish file:</label><br>
            <input type="file" id="fileSluggish" accept=".sluggish">
        </div>
        <hr>
        <div>
            <label>Load .ttf font:</label><br>
            <input type="file" id="fileTtf" accept=".ttf"><br>
            <button id="btnDownload">Download .sluggish</button>
        </div>
        <hr>
        <div>
            <label>Text to Render:</label><br>
            <textarea id="textInput" rows="4" style="width: 100%; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; padding: 5px;">The quick brown fox jumps over the lazy dog.
SLUG!</textarea>
        </div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/",
                "opentype.js": "https://unpkg.com/opentype.js@1.3.4/dist/opentype.module.js"
            }
        }
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
